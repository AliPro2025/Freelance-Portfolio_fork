<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Kickzone - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/navigation.css">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <div class="nav-left">
            <div class="nav-logo" onclick="window.location.href='../landing/index.html'">
                <div class="logo-icon"></div>
                <span class="logo-text">KickZone</span>
            </div>
            <div class="nav-menu">
                <a href="../landing/index.html#features" class="nav-link">Features</a>
                <a href="../landing/index.html#how-it-works" class="nav-link">How It Works</a>
                <a href="../landing/index.html#popular-fields" class="nav-link">Popular Fields</a>
            </div>
        </div>
        <div class="nav-actions">
            <button class="nav-btn primary" onclick="window.location.href='../login/index.html'">Login</button>
            <button class="nav-btn secondary" onclick="window.location.href='index.html'">Sign Up</button>
        </div>
    </div>
</nav>

<div class="main-container">
    <div class="overlay"></div>

    <div class="signin-container">
        <div class="logo-circle">
            <img src="images/Background+Shadow.svg" alt="KickZone Logo" width="40" height="40">
        </div>
        <h1 style="font-size: 1.5rem;">Create Account<br>Kickzone</h1>
        <p class="subtitle" style="font-size: 1rem;">Join our football community</p>

        <form style="max-width: 300px;" class="auth-form">
            <div class="input-group">
                <label for="fullname" style="font-size: 1rem;">Full Name</label>
                <div class="input-field">
                    <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#757575" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <input type="text" id="fullname" name="full_name" placeholder="Enter your full name" required style="font-size: 1rem;">
                </div>
            </div>

            <div class="input-group">
                <label for="email" style="font-size: 1rem;">Email Address</label>
                <div class="input-field">
                    <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#757575" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required style="font-size: 1rem;">
                </div>
            </div>

            <div class="input-group">
                <label for="password" style="font-size: 1rem;">Password</label>
                <div class="input-field">
                    <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#757575" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" id="password" name="password" placeholder="••••••••" required style="font-size: 1rem;">
                </div>
            </div>

            <div class="input-group">
                <label for="confirm" style="font-size: 1rem;">Confirm Password</label>
                <div class="input-field">
                    <svg class="icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#757575" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <input type="password" id="confirm" name="password_confirmation" placeholder="••••••••" required style="font-size: 1rem;">
                </div>
            </div>

            <div class="remember-row">
                <input type="checkbox" id="terms">
                <label for="terms">I agree to the Terms and Conditions</label>
            </div>

            <button type="submit" class="signin-btn">Create Account</button>
        </form>

        <div class="or-divider">
            <span>OR CONTINUE WITH</span>
        </div>

        <div class="social-btns">
            <button class="social-btn google">Google</button>
            <button class="social-btn facebook">Facebook</button>
        </div>

        <p class="signup-row">Already have an account? <a href="../login/index.html">login</a></p>
    </div>
</div>

<script src="../../config.js"></script>
<script src="js/script.js"></script>
</body>
</html>
